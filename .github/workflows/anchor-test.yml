name: Anchor Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  anchor-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            clang \
            llvm \
            build-essential

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Solana CLI
        shell: bash
        run: |
          set -euo pipefail
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          SOLANA_BIN="$HOME/.local/share/solana/install/active_release/bin"
          export PATH="$SOLANA_BIN:$PATH"
          echo "$SOLANA_BIN" >> "$GITHUB_PATH"
          solana --version

      - name: Install Anchor CLI
        run: |
          cargo install \
            --git https://github.com/coral-xyz/anchor \
            anchor-cli

      - name: Install SurfPool
        run: curl -sL https://run.surfpool.run/ | bash
      - name: Install npm dependencies
        run: npm install

      - name: Create Solana keypair for tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -s -o ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json
          solana config set --url localhost
          solana address

      - name: Run Anchor tests
        run: |
          set -euo pipefail
          rustup toolchain install nightly-2026-03-01
          rustup default nightly-2026-03-01
          export RUSTUP_TOOLCHAIN=nightly-2026-03-01
          export RUSTC="$(rustup which rustc)"
          export CARGO="$(rustup which cargo)"
          echo "RUSTUP_TOOLCHAIN=$RUSTUP_TOOLCHAIN"
          echo "RUSTC=$RUSTC"
          echo "CARGO=$CARGO"
          rustc -V
          cargo -V

          anchor test
